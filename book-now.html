<body class="section-dark" style="background:var(--bg-dark)">

  <header class="site-header">
    <img src="rank-angel-logo.png" alt="Rank Angel" />
  </header>

  <section class="page-intro">
    <div class="container">
      <h1 class="territory-headline"><span id="zip-note">Your Territory Is Available &mdash; Claim It Before It&rsquo;s Gone!</span><span class="blink-dot" aria-hidden="true"></span></h1>
      <h2 class="page-subhead">Choose a Time for Your Free Strategy Call</h2>

  <div class="calendar-wrap">
    <!-- GHL booking embed -->
    <iframe style="width:100%;border:none;overflow:hidden;"
            scrolling="no"
            id="9WIdxZKft7481V1mX5uz_1782743879826"></iframe>
    <script>
      // Build the booking URL WITH the lead's details BEFORE the GHL widget loads,
      // so name / company / phone / email / zip prefill on first render (no reload).
      (function () {
        var base = 'https://api.leadconnectorhq.com/widget/booking/9WIdxZKft7481V1mX5uz';
        var lead = {};
        try { lead = JSON.parse(sessionStorage.getItem('lead_data') || '{}') || {}; } catch (e) {}
        var p = new URLSearchParams(location.search);
        var zip = p.get('zip') || lead.zip || '';
        var qs = new URLSearchParams();
        var name = (lead.name || '').trim();
        if (name) {
          var n = name.split(/\s+/);
          qs.set('first_name', n.shift());
          if (n.length) qs.set('last_name', n.join(' '));
          qs.set('name', name);
          qs.set('full_name', name);
        }
        if (lead.email)   qs.set('email', lead.email);
        if (lead.phone)   qs.set('phone', lead.phone);
        if (lead.company) qs.set('organization', lead.company); // booking form field name="organization"
        if (zip)          qs.set('zip', zip);
        document.getElementById('9WIdxZKft7481V1mX5uz_1782743879826').src =
          base + (qs.toString() ? ('?' + qs.toString()) : '');
      })();
    </script>
    <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>

  <script src="script.js"></script>
  <script>
    // Redirect to the thank-you page when GHL signals a completed booking.
    window.addEventListener('message', function (e) {
      var d = e.data;
      var isBooked =
        (typeof d === 'string' && /appointment|booked|booking_confirm/i.test(d)) ||
        (d && (d.type === 'appointmentBooked' || d.event === 'appointmentBooked' || d.page === 'thankyou'));
      if (isBooked) {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: 'calendar_booked' });
        window.location.href = 'thankyou.html';
      }
    });
  </script>
